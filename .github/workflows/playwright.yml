name: Playwright E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL base para os testes'
        required: false
        default: 'http://localhost:4000'

jobs:
  test:
    name: Run E2E Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 📄 Configurar Variáveis de Ambiente (Docker)
      working-directory: ./Next-Event
      run: cp .env.example .env

    - name: 🐳 Subir Docker (Frontend + Backend + DB)
      working-directory: ./Next-Event
      run: docker compose up -d

    - name: 📦 Instalar dependências (E2E)
      working-directory: ./Next-Event/e2e
      run: npm ci

    - name: 🎭 Instalar browsers do Playwright
      working-directory: ./Next-Event/e2e
      run: npx playwright install --with-deps

    # NOVO: cria o .env dentro de e2e/, que antes não existia em CI.
    # IMPORTANTE: confirme no seu docker-compose.yml a porta real exposta
    # do serviço postgres no host. Estou assumindo 5433 com base no seu
    # .env local — ajuste se o compose mapear diferente (ex: "5433:5432").
    - name: 📄 Configurar Variáveis de Ambiente (E2E)
      working-directory: ./Next-Event/e2e
      run: |
        cat <<EOF > .env
        DATABASE_URL=postgresql://nextevent_user:nextevent_password@localhost:5433/nextevent_db?schema=public
        API_URL=http://localhost:3000
        BASE_URL=${{ github.event.inputs.base_url || 'http://localhost:4000' }}
        EOF

    - name: ⏳ Aguardar aplicação subir (DB + Backend + Frontend)
      working-directory: ./Next-Event
      run: |
        echo "Aguardando Postgres na porta 5433..."
        npx -y wait-on tcp:localhost:5433 --timeout 120000

        echo "--- Logs iniciais do backend ---"
        docker compose logs backend --tail=30

        echo "Aguardando Backend na porta 3000..."
        npx -y wait-on tcp:localhost:3000 --timeout 300000

        echo "--- Logs do backend após porta aberta ---"
        docker compose logs backend --tail=20

        echo "Aguardando Frontend na porta 4000..."
        npx -y wait-on tcp:localhost:4000 --timeout 120000

    - name: 🚀 Rodar testes Playwright
      working-directory: ./Next-Event/e2e
      run: npx playwright test
      env:
        BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:4000' }}
        DATABASE_URL: postgresql://nextevent_user:nextevent_password@localhost:5433/nextevent_db?schema=public
        API_URL: http://localhost:3000

    - name: 📋 Logs do Docker Compose (Em caso de falha)
      if: failure()
      working-directory: ./Next-Event
      run: |
        echo "--- STATUS DOS CONTAINERS ---"
        docker ps
        echo "--- LOGS DO DOCKER COMPOSE ---"
        docker compose logs --tail=200

    - name: 📊 Upload do Relatório (Playwright)
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: ./Next-Event/e2e/playwright-report/
        retention-days: 30
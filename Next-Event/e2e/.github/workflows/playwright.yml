name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL base para os testes'
        required: false
        default: 'http://localhost:4000'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: 📦 Instalar dependências
      run: npm ci

    - name: 🎭 Instalar browsers
      run: npx playwright install --with-deps

    # 🔥 AQUI ESTÁ O PONTO PRINCIPAL
    - name: 🐳 Subir Docker (frontend + backend + db)
      run: docker compose up -d

    - name: ⏳ Aguardar aplicação subir
      run: npx wait-on http://localhost:4000

    - name: 🚀 Rodar testes
      run: npx playwright test
      env:
        BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:4000' }}

    - name: 📊 Upload relatório
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30